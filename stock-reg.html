<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="stock-reg.css" />
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-3 bg-light">
          <div class="circle">
            <span class="square"></span>
            <p class="text">Allen Nakalema: Stock Manager</p>
          </div>
          <div class="side-bar">
            <a href="dashboard.html">Dashboard</a>
          </div>
          <div class="side-bar">
            <a href="sales-management.html">Sales Management</a>
          </div>
          <div class="side-bar">
            <a href="supplier-management.html">Supplier Management</a>
          </div>
          <div class="side-bar">
            <a href="stock-management.html">Stock Management</a>
          </div>
          <div class="side-bar">
            <a href="transport-management.html">Transport Management</a>
          </div>
        </div>

        <div class="col-9">
          <form action="">
            <div class="head">
            <h1 class="text-start"><img src="images/business.png" class="image">Stock Registration</h1>
            <p class="text-start">Register new stock items in inventory</p>
            </div>
            <div class="row">
              <div class="col my-4">
                <label for="itemName">Item Name *</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Enter item name"
                  aria-label="Item Name *"
                />
              </div>
              <div class="col my-4">
                <label for="Pdtcode">SKU/Product Code *</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Enter SKU"
                  aria-label="SKU/Product Code *"
                />
              </div>
            </div>
            <div class="row">
              <div class="col mb-4">
                <label for="category">Category *</label>
                <select class="form-select select" aria-label="Category *">
                  <option selected>Select category</option>
                  <option value="1">Electronics</option>
                  <option value="2">Furniture</option>
                  <option value="3">Office Supplies</option>
                  <option value="4">Raw Materials</option>
                  <option value="5">Finished goods</option>
                  <option value="6">Consumables</option>
                  <option value="7">Other</option>
                </select>
              </div>
              <div class="col mb-4">
                <label for="quantity">Quantity *</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Enter quantity"
                  aria-label="Quantity"
                />
              </div>
            </div>
            <div class="row">
              <div class="col mb-4">
                <label for="unitPrice">Unit Price ($) *</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="0.00"
                  aria-label="Unit price"
                />
              </div>
              <div class="col mb-4">
                <label for="supplier">Supplier</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Enter supplier name"
                  aria-label="Supplier"
                />
              </div>
            </div>
            <div class="row">
              <div class="col mb-4">
                <label for="location">Warehouse Location</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="e.g, Aisle 3, Shelf B"
                  aria-label="Warehouse Location"
                />
              </div>
            </div>
            <div class="mb-5">
              <label for="floatingTextarea2">Description</label>
              <textarea
                class="form-control select"
                placeholder="Enter item description, specifications, or additional notes..."
                id="floatingTextarea2"
                style="height: 130px"
              ></textarea>
            </div>
            <div class="button">
            <button class="btn btn-primary mb-4" type="submit" style="width: 670px">Register Stock Item</button>
            <button type="reset" class="btn btn-outline-dark mb-4" style="width: 80px; margin-left: 15px;">
              Clear
            </button>
        
          </form>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
